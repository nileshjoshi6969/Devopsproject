<!DOCTYPE html>
<html>
<head>
  <title>Transporters</title>
</head>
<body>
  <h1>🚚 Available Transporters</h1>
  <div id="list">Loading...</div>

  <script>
    async function loadTransporters() {
      try {
        const res = await fetch('/api/transporters');
        const data = await res.json();

        const list = document.getElementById("list");

        if (!data || data.error) {
          list.innerHTML = "❌ Failed to load data";
          return;
        }

        list.innerHTML = data.map(t => `
          <div>
            <h3>${t.name}</h3>
            <p>Truck: ${t.truck}</p>
            <p>Fare: ${t.fare_per_km}</p>
            <hr>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById("list").innerHTML = "❌ Error loading data";
      }
    }

    loadTransporters();
  </script>
</body>
</html>
