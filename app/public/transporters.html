<!DOCTYPE html>
<html>
<head>
  <title>Transporters</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .card h3 {
      color: #4a47a3;
      margin-bottom: 10px;
    }

    .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #4a47a3;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .info {
      margin: 8px 0;
      font-size: 14px;
    }

    .highlight {
      background: #f1f2f6;
      padding: 8px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .loading, .error {
      text-align: center;
      font-size: 18px;
      color: white;
      margin-top: 20px;
    }

    .error {
      color: #ff6b6b;
    }

    .button {
      margin-top: 12px;
      padding: 8px;
      border: none;
      background: #4a47a3;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }

    .button:hover {
      background: #3b3a8f;
    }
  </style>
</head>

<body>

  <h1>🚚 Available Transporters</h1>

  <div id="status" class="loading">Loading transporters...</div>
  <div class="container" id="list"></div>

  <script>
    async function loadTransporters() {
      try {
        const res = await fetch('/api/transporters');
        const data = await res.json();

        const list = document.getElementById("list");
        const status = document.getElementById("status");

        if (!data || data.error) {
          status.innerHTML = "❌ Failed to load transporters";
          status.className = "error";
          return;
        }

        status.style.display = "none";

        list.innerHTML = data.map(t => `
          <div class="card">
            <span class="badge">⭐ ${t.rating}</span>

            <h3>${t.name}</h3>

            <p class="info">🚛 Truck: <strong>${t.truck}</strong></p>
            <p class="info">💰 Fare: ₹${t.fare_per_km}/km</p>
            <p class="info">📦 Trips Completed: ${t.past_trips}</p>

            <div class="highlight">
              <p>📞 ${t.phone}</p>
              <p>📧 ${t.email}</p>
              <p>📍 ${t.location}</p>
            </div>

            <button class="button">Book Now</button>
          </div>
        `).join('');

      } catch (err) {
        document.getElementById("status").innerHTML = "❌ Error loading data";
        document.getElementById("status").className = "error";
      }
    }

    loadTransporters();
  </script>

</body>
</html>
